# Blueprint Render (render.com) : New + → Blueprint → sélectionner ce dépôt.
# Render détecte ce fichier automatiquement et configure le service seul.
services:
  - type: web
    name: calmap
    runtime: python
    plan: free
    branch: ajout-frontend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
